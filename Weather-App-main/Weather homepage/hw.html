
<html>
<head>
    <title>My Weather App Homepage</title>
    <link rel="stylesheet" href="hw.css">
</head>
<body>
    <div class="page-header">
        <h1>My Weather App</h1>
        <p>Live Dashboard & Forecast</p>
    </div>
    <div id="weather-card">
        <div class="weather-icon">☀️</div>
        <h2 class="city-name">Lahore</h2>
        <p class="temperature">30°C</p>
        <p class="condition">Sunny & Clear</p>
    </div>
    <div id="forecast-section">
        <h3 class="forecast-title">Weekly Forecast</h3>
        <div class="forecast-container">
            <div class="day-card">
                <p class="day-name">Mon</p>
                <p class="day-icon">🌧️</p>
                <p class="day-temp">28°C</p>
            </div>
            <div class="day-card">
                <p class="day-name">Tue</p>
                <p class="day-icon">☀️</p>
                <p class="day-temp">34°C</p>
            </div>
            <div class="day-card">
                <p class="day-name">Wed</p>
                <p class="day-icon">⛅</p>
                <p class="day-temp">31°C</p>
            </div>
            <div class="day-card">
                <p class="day-name">Thu</p>
                <p class="day-icon">🌩️</p>
                <p class="day-temp">26°C</p>
            </div>
        </div>
    </div>
    <p class="made-by">Created by Muhammad Ali</p>

</body>
